name: Build Windows Package

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Read version
        shell: pwsh
        run: |
          $version = uv run python -c "from version import __version__; print(__version__)"
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build package
        shell: cmd
        env:
          CI: "1"
        run: build.bat

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WSL-Snapaste-v${{ env.VERSION }}
          path: dist/WSL-Snapaste-v${{ env.VERSION }}.zip
