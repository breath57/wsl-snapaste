name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Read version
        shell: pwsh
        run: |
          $version = uv run python -c "from version import __version__; print(__version__)"
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build exe
        shell: cmd
        env:
          CI: "1"
        run: build.bat

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WSL-Snapaste-v${{ env.VERSION }}
          path: dist/WSL-Snapaste*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WSL-Snapaste*.exe
